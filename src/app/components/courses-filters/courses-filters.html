<div class="courses-filters">
  <input
    [(ngModel)]="filters.searchString"
    [class]="{ 'courses-filters__search-field_visible': doesSearchFieldHaveVisibleModifier }"
    class="courses-filters__search-field"
    type="text"
    placeholder="Поиск..."
  >

  <button class="courses-filters__button-show-filters" title="Показать фильтры" (click)="isShowModal = true">
    <svg width="16" height="16" viewBox="0 0 16 16" class="courses-filters__button-show-filters-icon">
      <path

        fill="#9B5DE5" />
    </svg>
    <span class="courses-filters__button-show-filters-title">Фильтры</span>
  </button>

  <button
    class="courses-filters__button-search"
    (click)="doesSearchFieldHaveVisibleModifier = !doesSearchFieldHaveVisibleModifier"
  >
    <svg width="16" height="16" viewBox="0 0 16 16">
      <path
        d="M12.0203 11.0779L14.8757 13.9326L13.9323 14.8759L11.0777 12.0206C10.0155 12.8721 8.69434 13.3352 7.33301 13.3333C4.02101 13.3333 1.33301 10.6453 1.33301 7.33325C1.33301 4.02125 4.02101 1.33325 7.33301 1.33325C10.645 1.33325 13.333 4.02125 13.333 7.33325C13.3349 8.69459 12.8718 10.0157 12.0203 11.0779ZM10.683 10.5833C11.5291 9.71318 12.0016 8.54687 11.9997 7.33325C11.9997 4.75459 9.91101 2.66659 7.33301 2.66659C4.75434 2.66659 2.66634 4.75459 2.66634 7.33325C2.66634 9.91125 4.75434 11.9999 7.33301 11.9999C8.54663 12.0018 9.71293 11.5293 10.583 10.6833L10.683 10.5833Z"
        fill="#B8B8B8" />
    </svg>
  </button>

  <app-select
    [(value)]="sorting"
    [items]="availableSortings"
    [selectTitle]="'Сортировка'"
    (valueChange)="filterChangedHandler()"
    [class]="'courses-filters__sort'"
  />

  <div class="courses-filters__table-section">
    <app-multiple-select
      [(value)]="filters.selectedCategories"
      [items]="categories()"
      [withChildren]="true"
      [selectTitle]="'Категория'"
      [itemValuePropName]="'id'"
      [itemTitlePropName]="'title'"
      [childrenPropName]="'subCategories'"
      [childValuePropName]="'id'"
      [childTextPropName]="'title'"
      (valueChange)="filters.selectedCategories = $event"
      [class]="'courses-filters__category'"
    />

    <app-multiple-select
      [(value)]="filters.selectedSchools"
      [items]="schools()"
      [selectTitle]="'Школа'"
      [itemValuePropName]="'id'"
      [itemTitlePropName]="'title'"
      (valueChange)="filters.selectedSchools = $event"
      [class]="'courses-filters__school'"
    />

    <app-multiple-select
      [(value)]="filters.selectedDuration"
      [items]="duration()"
      [selectTitle]="'Продолжительность'"
      [itemValuePropName]="'id'"
      [itemTitlePropName]="'title'"
      [class]="'courses-filters__duration'"
      (valueChange)="filters.selectedDuration = $event"
    />

    <app-multiple-select
      [(value)]="filters.selectedPaymentTypes"
      [items]="paymentTypes()"
      [selectTitle]="'Тип оплаты'"
      [itemValuePropName]="'id'"
      [itemTitlePropName]="'title'"
      (valueChange)="filters.selectedPaymentTypes = $event"
      [class]="'courses-filters__payment-type'"
    />

    <app-multiple-select
      [(value)]="filters.selectedEducationFormats"
      [items]="educationFormats()"
      [selectTitle]="'Формат обучения'"
      [itemValuePropName]="'id'"
      [itemTitlePropName]="'title'"
      (valueChange)="filters.selectedEducationFormats = $event"
      [class]="'courses-filters__education-format'"
    />
  </div>
  @if (courses()) {
    <div class="courses-filters__table-header">
      <div
        (click)="handleSorting('courseName')"
        [class]="{
          'courses-filters__table-header-title_sort-asc' : filters.sorting?.field && filters.sorting?.field === 'courseName' && filters.sorting?.type && filters.sorting?.type === 'ASC',
          'courses-filters__table-header-title_sort-desc' : filters.sorting?.field && filters.sorting?.field === 'courseName' && filters.sorting?.type && filters.sorting?.type === 'DESC',
          'courses-filters__table-header-title' : true
        }"
      >
        Курс
      </div>
      <div
        (click)="handleSorting('schoolName')"
        [class]="{
          'courses-filters__table-header-title_sort-asc': filters.sorting?.field && filters.sorting?.field === 'schoolName' && filters.sorting?.type && filters.sorting?.type === 'ASC',
          'courses-filters__table-header-title_sort-desc': filters.sorting?.field && filters.sorting?.field === 'schoolName' && filters.sorting?.type && filters.sorting?.type === 'DESC',
          'courses-filters__table-header-title' : true
     }">
        Школа
      </div>
      <div
        (click)="handleSorting('price')"
        [class]="{
          'courses-filters__table-header-title_sort-asc': filters.sorting?.field && filters.sorting?.field === 'price' && filters.sorting?.type && filters.sorting?.type === 'ASC',
          'courses-filters__table-header-title_sort-desc': filters.sorting?.field && filters.sorting?.field === 'price' && filters.sorting?.type && filters.sorting?.type === 'DESC',
          'courses-filters__table-header-title' : true
      }">
        Цена
      </div>
      <div
        (click)="handleSorting('duration')"
        [class]="{
          'courses-filters__table-header-title_sort-asc': filters.sorting?.field && filters.sorting?.field === 'duration' && filters.sorting?.type && filters.sorting?.type === 'ASC',
          'courses-filters__table-header-title_sort-desc': filters.sorting?.field && filters.sorting?.field === 'duration' && filters.sorting?.type && filters.sorting?.type === 'DESC',
          'courses-filters__table-header-title' : true
       }">
        Длительность
      </div>
      <div class="courses-filters__table-header-title courses-filters__table-header-title_no-sort">Особенности</div>
      <div class="courses-filters__table-header-title courses-filters__table-header-title_no-sort">Подробнее</div>
    </div>
  }
</div>
<app-modal [(value)]="isShowModal" title="Фильтры">
  <div class="courses-filters__modal">
    <div class="courses-filters__modal-counter-line">
      <span class="courses-filters__modal-counter-line-title">
        Всего выбрано: {{ selectedFiltersCount }}
      </span>
      <span class="courses-filters__modal-counter-line-reset" (click)="resetFilters">Сбросить</span>
    </div>

    <app-selector
      [items]="categories()"
      [(value)]="filters.selectedCategories"
      [withChildren]="true"
      [itemValuePropName]="'id'"
      [itemTextPropName]="'title'"
      [childrenPropName]="'subCategories'"
      [childValuePropName]="'id'"
      [childTextPropName]="'title'"
      [title]="'Категория курса'"
    />

    <app-selector
      [(value)]="filters.selectedSchools"
      [items]="schools()"
      [itemValuePropName]="'id'"
      [itemTextPropName]="'title'"
      [title]="'Школа'"
    />

    <app-selector
      [(value)]="filters.selectedDuration"
      [items]="duration()"
      [itemValuePropName]="'id'"
      [itemTextPropName]="'title'"
      [title]="'Длительность'"
    />

    <app-selector
      [(value)]="filters.selectedPaymentTypes"
      [items]="paymentTypes()"
      [itemValuePropName]="'id'"
      [itemTextPropName]="'title'"
      [title]="'Тип оплаты'"
    />

    <app-selector
      [(value)]="filters.selectedEducationFormats"
      [items]="educationFormats()"
      [itemValuePropName]="'id'"
      [itemTextPropName]="'title'"
      [title]="'Формат обучения'"
    />

    <button class="courses-filters__modal-button" (click)="isShowModal = false">
      @if (coursesCount()) {
        <span>Показать {{ coursesCount() }} курс(а)</span>
      } @else {
        <span>Ничего не найдено</span>
      }
    </button>
  </div>
</app-modal>
