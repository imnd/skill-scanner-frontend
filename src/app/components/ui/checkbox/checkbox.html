<label class="skill-scanner-checkbox">
  <input
    [(ngModel)]="model"
    [value]="id"
    type="checkbox"
    class="skill-scanner-checkbox__input"
  />
  <span
    class="skill-scanner-checkbox__element"
    [class]="{ 'skill-scanner-checkbox__element_active': isActive }"
  ></span>
  <span class="skill-scanner-checkbox__text">{{ text }}</span>
</label>
