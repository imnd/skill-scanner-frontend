<label class="edvisor-checkbox">
  <input
    [(ngModel)]="model"
    [value]="id"
    type="checkbox"
    class="edvisor-checkbox__input"
  />
  <span
    class="edvisor-checkbox__element"
    [class]="{ 'edvisor-checkbox__element_active': isActive }"
  ></span>
  <span class="edvisor-checkbox__text">{{ text }}</span>
</label>
