<div class="skill-scanner-selector">
  <div class="skill-scanner-selector__title-counter-block" (click)="isItemsShowed = true">
    <span class="skill-scanner-selector__title">{{ title }}</span>
    <span class="skill-scanner-selector__counter">Выбрано: {{ selectedItemsCount }}</span>
  </div>

  <app-modal
    [(value)]="isItemsShowed"
    [zIndex]="10001"
    [withBackIcon]="true"
    [title]="title"
  >
    <ul class="skill-scanner-selector__list">
      @for (item of items; track item[itemValuePropName]) {
      <li class="skill-scanner-selector__item">
        @if (modalComponent === 'CheckboxGroup') {
          <app-checkbox-group
            [id]="item[itemValuePropName]"
            [text]="item[itemTextPropName]"
            [(value)]="model"
            [items]="withChildren ? item[childrenPropName] : null"
            [itemValuePropName]="childValuePropName"
            [itemTextPropName]="childTextPropName"
          />
        } @else {
          <app-checkbox
            [id]="item[itemValuePropName]"
            [text]="item[itemTextPropName]"
            [value]="model"
            (valueChange)="onValueChange($event)"
          />
        }
      </li>
      }
    </ul>
  </app-modal>
</div>
